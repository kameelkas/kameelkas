name: Update GitHub Stats SVG

on:
  schedule:
    # Runs every day at 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch: # allows manual trigger from the Actions tab
  push:
    branches: [main]
    paths:
      - "generate-stats.js"
      - "update-stats.yml"

permissions:
  contents: write # needed to commit the generated SVG back to the repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate stats SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # free, auto-injected
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node generate-stats.js

      - name: Commit and push SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update stats.svg [skip ci]"
          git push